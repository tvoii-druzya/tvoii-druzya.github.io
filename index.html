<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Друзя — общение с друзьями</title>
  <link rel="icon" href="https://tvoii-druzya.github.io/Riadom/logo.png" type="image/png">
  <style>
    :root {
      --bg: #fff9f7;
      --text: #4a4a4a;
      --accent: #d48f94;
      --border: #e0e0e0;
      --white: #ffffff;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'PT Serif', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      padding: 50px 30px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      border-radius: 25%;
      overflow: hidden;
      border: 3px solid var(--accent);
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h1 {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 16px;
      font-weight: 700;
    }
    p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      margin: 10px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 14px rgba(212, 143, 148, 0.3);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(212, 143, 148, 0.4);
    }
    footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://tvoii-druzya.github.io/Riadom/logo.png" alt="Логотип Друзя">
    </div>
    <h1>Друзя</h1>
    <p>
      Простое и тёплое общение с друзьями.<br>
      Приложение для тех, кто ценит настоящие разговоры.
    </p>

    <a href="https://play.google.com/store/apps/details?id=com.tvoii.druzya" class="btn" target="_blank">
      Скачать приложение
    </a>
    <a href="https://tvoii-druzya.github.io/Riadom/" class="btn">
      Восстановить пароль
    </a>

    <footer>
      © 2025 Друзя. Все права защищены.
    </footer>
  </div>
</body>
</html>
